# Brute-Force-Schutz: max. 10 Requests/Minute pro IP, burst 20
limit_req_zone $binary_remote_addr zone=tsbot_limit:10m rate=10r/m;

server {
    listen 80;
    server_name tsbot.devprops.de;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name tsbot.devprops.de;

    ssl_certificate     /etc/letsencrypt/live/tsbot.devprops.de/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tsbot.devprops.de/privkey.pem;

    location / {
        limit_req zone=tsbot_limit burst=20 nodelay;
        limit_req_status 429;

        proxy_pass         http://127.0.0.1:8080;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_http_version 1.1;
        proxy_read_timeout 300s;
    }
}
