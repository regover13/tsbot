name: Build & Deploy

on:
  push:
    branches: [master]

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/regover13/tsbot
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & Push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trigger Portainer Redeploy
        if: success()
        env:
          PORTAINER_URL: ${{ secrets.PORTAINER_URL }}
          PORTAINER_USER: ${{ secrets.PORTAINER_USER }}
          PORTAINER_PASS: ${{ secrets.PORTAINER_PASS }}
          PORTAINER_STACK_ID: ${{ secrets.PORTAINER_STACK_ID }}
          PORTAINER_ENDPOINT_ID: ${{ secrets.PORTAINER_ENDPOINT_ID }}
          GIT_SHA: ${{ github.sha }}
        run: |
          # Login → JWT holen
          JWT=$(curl -s -X POST "$PORTAINER_URL/api/auth" \
            -H "Content-Type: application/json" \
            -d "{\"username\":\"$PORTAINER_USER\",\"password\":\"$PORTAINER_PASS\"}" \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['jwt'])")

          # Stack-YAML einlesen, :latest durch :<sha> ersetzen → Container wird recreated
          COMPOSE=$(python3 -c "import json,os; sha=os.environ.get('GIT_SHA','latest'); c=open('docker-compose.yml').read().replace(':latest',':'+sha); print(json.dumps(c))")

          # Stack updaten + neues Image pullen
          HTTP_CODE=$(curl -s -o /tmp/portainer_response.txt -w "%{http_code}" \
            -X PUT "$PORTAINER_URL/api/stacks/$PORTAINER_STACK_ID?endpointId=$PORTAINER_ENDPOINT_ID" \
            -H "Authorization: Bearer $JWT" \
            -H "Content-Type: application/json" \
            -d "{\"stackFileContent\":$COMPOSE,\"env\":[],\"prune\":false,\"pullImage\":true}")

          echo "Portainer response: $HTTP_CODE"
          cat /tmp/portainer_response.txt | python3 -c "import sys,json; d=json.load(sys.stdin); print('Stack ID:', d.get('Id','?'))" 2>/dev/null || true

          if [ "$HTTP_CODE" != "200" ]; then
            echo "::error::Portainer Redeploy fehlgeschlagen (HTTP $HTTP_CODE)"
            cat /tmp/portainer_response.txt
            exit 1
          fi
